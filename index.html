<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi corazón...</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    width: 100%;
    height: 100%;
    font-family: "Georgia", serif;
}

canvas {
    display: block;
}

#message {
    position: absolute;
    width: 100%;
    text-align: center;

    top: 90%;

    color: #e9d4ff;
    font-size: 2rem;

    letter-spacing: 1px;

    text-shadow:
      0 0 10px #c084fc,
      0 0 25px #c084fc,
      0 0 40px #a855f7;
}

#cursor {
    animation: blink 0.8s infinite;
}

@keyframes blink {
    0%, 50% {
        opacity: 1;
    }

    51%, 100% {
        opacity: 0;
    }
}

#start {
    position: absolute;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #d8b4fe;
    font-size: 1.3rem;
    cursor: pointer;
    z-index: 10;
}
</style>
</head>

<body>

<div id="start">
    Haz clic aquí ❤️
</div>

<div id="message"></div>

<audio id="audio" src="audio.mp3"></audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heartPoint(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y:
            13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t)
    };
}

const scale = 18;

for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;

    const p = heartPoint(t);

    particles.push({
        targetX: p.x * scale,
        targetY: -p.y * scale,

        x: (Math.random() - 0.5) * window.innerWidth,
        y: (Math.random() - 0.5) * window.innerHeight,

        size: Math.random() * 2 + 1
    });
}

let progress = 0;
let pulse = 1;

function animate() {

    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2 - 100;

    pulse = 1 + Math.sin(Date.now()*0.003) * 0.08;

    particles.forEach(p => {

        p.x += (p.targetX*pulse + cx - p.x) * 0.02;
        p.y += (p.targetY*pulse + cy - p.y) * 0.02;

        const glow = Math.random()*4+4;

        ctx.beginPath();
        ctx.fillStyle = "#d8b4fe";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#c084fc";

        ctx.arc(
            p.x,
            p.y,
            glow * 0.25,
            0,
            Math.PI * 2
        );

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

document.getElementById("start").addEventListener("click", () => {

    document.getElementById("audio").play();

    document.getElementById("start").style.display = "none";

    setTimeout(() => {
        typeText();
    }, 5000);

});

document.getElementById("start").addEventListener("click", () => {

    document.getElementById("audio").play();

    document.getElementById("start").style.display = "none";
});

const finalText = "Mi corazón ahora es tuyo";

function typeText() {

    const box = document.getElementById("message");

    let i = 0;

    box.innerHTML = '<span id="cursor">|</span>';

    const timer = setInterval(() => {

        const text = finalText.slice(0, i + 1);

        box.innerHTML =
            text + '<span id="cursor">|</span>';

        i++;

        if (i >= finalText.length) {

            clearInterval(timer);

            setTimeout(() => {
                box.innerHTML =
                    finalText + '<span id="cursor">|</span>';
            }, 800);
        }

    }, 120);
}
</script>

</body>
</html>
